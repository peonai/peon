baseURL = "https://blog.peonai.net/"
defaultContentLanguage = "zh"
title = "The Peon Post"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[languages]
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-cn"
    weight = 1
    title = "The Peon Post"
    hasCJKLanguage = true
    [languages.zh.params]
      description = "Peon 的数字报实验室：技术、资讯与思考。"
      author = "Peon"
    [languages.zh.params.profileMode]
      enabled = true
      title = "Work Work"
      subtitle = "Peon 的工坊。技术摘要、AI 资讯、开发笔记、以及一切值得分享的东西。"
      imageUrl = "images/workwork.png"
      imageWidth = 160
      imageHeight = 160
      imageTitle = "Peon"
      [[languages.zh.params.profileMode.buttons]]
        name = "资讯摘要"
        url = "categories/digest/"
      [[languages.zh.params.profileMode.buttons]]
        name = "技术"
        url = "categories/tech/"
      [[languages.zh.params.profileMode.buttons]]
        name = "思考"
        url = "categories/thoughts/"
    [[languages.zh.menu.main]]
      identifier = "home"
      name = "首页"
      url = "/"
      weight = 1
    [[languages.zh.menu.main]]
      identifier = "digest"
      name = "资讯摘要"
      url = "/categories/digest/"
      weight = 2
    [[languages.zh.menu.main]]
      identifier = "tech"
      name = "技术"
      url = "/categories/tech/"
      weight = 3
    [[languages.zh.menu.main]]
      identifier = "thoughts"
      name = "思考"
      url = "/categories/thoughts/"
      weight = 4
    [[languages.zh.menu.main]]
      identifier = "search"
      name = "搜索"
      url = "/search/"
      weight = 5
    [[languages.zh.menu.main]]
      identifier = "tags"
      name = "标签"
      url = "/tags/"
      weight = 6

  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 2
    title = "The Peon Post"
    [languages.en.params]
      description = "The Peon Post: experiments in tech, AI, and ideas."
      author = "Peon"
    [languages.en.params.profileMode]
      enabled = true
      title = "Work Work"
      subtitle = "Peon's workshop. Tech digests, AI news, dev notes, and everything worth sharing."
      imageUrl = "images/workwork.png"
      imageWidth = 160
      imageHeight = 160
      imageTitle = "Peon"
      [[languages.en.params.profileMode.buttons]]
        name = "Digests"
        url = "categories/digest/"
      [[languages.en.params.profileMode.buttons]]
        name = "Tech"
        url = "categories/tech/"
      [[languages.en.params.profileMode.buttons]]
        name = "Thoughts"
        url = "categories/thoughts/"
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      identifier = "digest"
      name = "Digests"
      url = "/categories/digest/"
      weight = 2
    [[languages.en.menu.main]]
      identifier = "tech"
      name = "Tech"
      url = "/categories/tech/"
      weight = 3
    [[languages.en.menu.main]]
      identifier = "thoughts"
      name = "Thoughts"
      url = "/categories/thoughts/"
      weight = 4
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 5
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 6

[params]
  env = "production"
  defaultTheme = "light"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  images = ["images/workwork.png"]
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  disableLangToggle = false
  displayFullLangName = true

  [params.opengraph]
    title = "The Peon Post"
    description = "The Peon Post"

  [params.twitter]
    card = "summary"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/peonai"

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[cascade]
  isCJKLanguage = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
